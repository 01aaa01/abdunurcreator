<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: arial, sans-serif;
        }
        body {
            background-color: #fff;
            color: #202124;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        /* Header Styles */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            font-size: 13px;
        }
        header a {
            color: #1f1f1f;
            text-decoration: none;
            opacity: 0.75;
        }
        header a:hover {
            text-decoration: underline;
            opacity: 1;
        }
        .google-apps {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
        }
        .google-apps:hover {
            background-color: #f0f0f0;
        }
        .google-apps svg {
            width: 24px;
            height: 24px;
            fill: #5f6368;
        }
        .sign-in-btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 9px 23px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
        .sign-in-btn:hover {
            background-color: #1558b0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 109px; /* Approximate spacing from top */
        }
        .logo {
            margin-bottom: 24px;
        }
        .logo img {
            height: 92px;
        }
        .search-box {
            width: 100%;
            max-width: 584px;
            margin-bottom: 30px;
        }
        .search-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 5px 8px 5px 14px;
            background: white;
            box-shadow: none;
            transition: box-shadow 0.2s;
        }
        .search-wrapper:hover, .search-wrapper:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }
        .search-icon {
            width: 20px;
            height: 20px;
            color: #9aa0a6;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #202124;
            width: 100%;
            background: transparent;
        }
        .mic-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
            padding: 4px;
        }
        .mic-icon:hover {
            background-color: #f0f0f0;
            border-radius: 50%;
        }
        .buttons {
            display: flex;
            gap: 12px;
        }
        .btn {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            padding: 10px 16px;
            margin: 11px 4px;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            border: 1px solid #dadce0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            color: #202124;
        }
        .languages {
            margin-top: 24px;
            font-size: 13px;
        }
        .languages a {
            color: #1a0dab;
            text-decoration: none;
            margin: 0 3px;
        }
        .languages a:hover {
            text-decoration: underline;
        }

        /* Footer Styles */
        footer {
            background-color: #f2f2f2;
            border-top: 1px solid #e4e4e4;
            font-size: 14px;
            color: #70757a;
        }
        .footer-country {
            padding: 15px 30px;
            border-bottom: 1px solid #dadce0;
            font-size: 15px;
            color: #70757a;
        }
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            padding: 0 20px;
        }
        .footer-left, .footer-right {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 15px 0;
        }
        .footer-links a {
            color: #70757a;
            text-decoration: none;
            white-space: nowrap;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            main { padding-top: 60px; }
            .logo img { height: 70px; }
            .search-box { padding: 0 20px; }
            .footer-links { flex-direction: column; gap: 10px; }
            .footer-left, .footer-right { justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <a href="#">About</a>
    <a href="#">Store</a>

    </div>
    <button class="sign-in-btn">Sign in</button>
</header>

    <div class="search-box">
        <div class="search-wrapper">

        </div>
    </div>

    <div class="buttons">
        <button class="btn">Google Search</button>
        <button class="btn">I'm Feeling Lucky</button>
    </div>

    <div class="languages">
        Google offered in: 
        <a href="#">O'zbekcha</a>
        <a href="#">Русский</a>
        <a href="#">English</a>
        <a href="#">Français</a>
        <a href="#">Español</a>
        <a href="#">Deutsch</a>
        <!-- Add more languages as needed -->
    </div>
</main>

<footer>
    <div class="footer-country">Uzbekistan</div>
    <div class="footer-links">
        <div class="footer-left">
            <a href="#">Advertising</a>

            <a href="#">How Search works</a>
        </div>
        <div class="footer-right">
            <a href="#">Privacy</a>
